services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ms-simulation-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
        - RABBITMQ_DEFAULT_USER=user
        - RABBITMQ_DEFAULT_PASS=password
    volumes:
        - postgres
    networks:
        - rabbitmq_network

networks:
  rabbitmq_network:
    driver: bridge

